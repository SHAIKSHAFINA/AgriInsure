apiVersion: apps/v1
kind: Deployment
metadata:
  name: flood-insurance-app
  labels:
    app: flood-insurance-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flood-insurance-app
  template:
    metadata:
      labels:
        app: flood-insurance-app
    spec:
      containers:
        - name: frontend
          image: your-frontend-image:latest
          ports:
            - containerPort: 3000
          env:
            - name: REACT_APP_API_URL
              value: "http://backend-service:5000"
        - name: backend
          image: your-backend-image:latest
          ports:
            - containerPort: 5000
          env:
            - name: DATABASE_URL
              value: "your-database-url"
            - name: GOOGLE_CLOUD_PROJECT
              value: "your-gcp-project-id"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/path/to/credentials.json"
      imagePullSecrets:
        - name: regcred
---
apiVersion: v1
kind: Service
metadata:
  name: flood-insurance-app
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      name: frontend
    - port: 5000
      targetPort: 5000
      name: backend
  selector:
    app: flood-insurance-app